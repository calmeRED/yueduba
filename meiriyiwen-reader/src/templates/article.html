<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - 每日一文</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="header">
    <a href="../index.html" class="logo">每日一文</a>
    <button class="theme-toggle" aria-label="切换暗黑模式"></button>
  </header>

  <div class="main-layout">
    <nav class="nav-sidebar">
      <a href="../random.html" class="nav-item">
        <span class="icon">🎲</span>
        随机
      </a>
      <a href="../index.html" class="nav-item">
        <span class="icon">📚</span>
        书架
      </a>
    </nav>

    <article class="content-area">
      <div class="article-header">
        <h1 class="article-title">{{title}}</h1>
        <div class="article-author">{{author}}</div>
        <div class="article-source">
          原文：<a href="{{url}}" target="_blank" rel="noopener">查看原文</a>
        </div>
      </div>
      <div class="article-body">
        {{article}}
      </div>
    </article>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
