        <div class="article-author">林清玄</div>
        <div class="article-source">
          原文：<a href="" target="_blank" rel="noopener">查看原文</a>
        </div>
      </div>
      <div class="article-body">
        <p>小时候，我们住在南部乡下，由于兄弟姊妹很多，妈妈非常的忙碌，我“们只要一靠近妈妈，她最自然的反应是一掌把我们打开：“闪啦！大人在无闲，不要在这里绊手绊脚！”</p>
<p>因此，我非常渴望有一天能牵妈妈的手。</p>
<p>有一天，妈妈要到田里摘野菜，我跟着去，她突然牵起我的手，走在田间的小路，那时是黄昏，夕阳一片金黄，拉长了妈妈的身影，几乎覆盖了整条小路。</p>
<p>那时候我感觉到从未有过的幸福，生命原是如此美好！</p>
<p>经过三十几年了，每次想到那一幕，幸福的感觉仍在汹涌，呀！原来幸福的感觉是许多小小的感情所累积的。</p>
      </div>
