        <h1 class="article-title">你要是在麦田里遇到了我</h1>
        <div class="article-author">罗伯特·彭斯</div>
        <div class="article-source">
          原文：<a href="" target="_blank" rel="noopener">查看原文</a>
        </div>
      </div>
      <div class="article-body">
        <p>这里不是家</p>
<p>你却是生长根茎的影子</p>
<p>习惯把自己养在金黄的梦里</p>
<p>我在你的世界练习降落</p>
<p>不谈金钱 权利和性</p>
<p>只开着一扇干净的窗户</p>
<p>折射低飞的阳光</p>
<p>我们成了假模假式中</p>
<p>两尾漏网的鱼</p>
<p>不能跳舞 不能唱歌 不能暴露</p>
<p>在这个季节</p>
<p>我们适合坐在锋芒的背后</p>
<p>幻想给世界灌输一点点酒精</p>
<p>你要是在麦田里遇到了我</p>
<p>我要是在麦田里遇到了你</p>
<p>我们要是看到很多孩子</p>
<p>在麦田里做游戏</p>
<p>请微笑 请对视</p>
<p>态度都浮在生活的措辞里</p>
<p>我们都活在彼此的文字里</p>
      </div>
