        <h1 class="article-title">琐事</h1>
        <div class="article-author">芥川龙之介</div>
        <div class="article-source">
          原文：<a href="" target="_blank" rel="noopener">查看原文</a>
        </div>
      </div>
      <div class="article-body">
        <p>为使人生幸福，必须热爱日常琐事。云的光影，竹的摇曳，雀群的鸣声，行人的脸孔——须从所有日常琐事中体味无上的甘露。</p>
<p>问题是，为使人生幸福，热爱琐事之人又必为琐事所苦。跳入庭前古池的青蛙想必打破了百年愁忧，但跃出古池的青蛙或许又带来了百年愁忧。其实，芭蕉的一生既是享乐的一生，又是受苦的一生，这在任何人眼里都显而易见。为了微妙地享乐，我们又必须微妙地受苦。</p>
<p>为使人生幸福，我们必须苦于日常琐事。云的光影，竹的摇曳，雀群的鸣声，行人的脸孔——必须从所有日常琐事中体悟堕入地狱的痛苦。</p>
      </div>
