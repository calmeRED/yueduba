        <p>姐姐，今夜我在德令哈，夜色笼罩</p>
<p>姐姐，我今夜只有戈壁</p>
<p>草原尽头我两手空空</p>
<p>悲痛时握不住一颗泪滴</p>
<p>姐姐，今夜我在德令哈</p>

<p>除了那些路过的和居住的</p>
<p>德令哈┄┄今夜</p>
<p>这是唯一的，最后的，抒情。</p>
<p>这是唯一的，最后的，草原。</p>
<p>我把石头还给石头</p>
<p>让胜利的胜利</p>
<p>今夜青稞只属于她自己</p>
<p>一切都在生长</p>
<p>今夜我只有美丽的戈壁 空空</p>
<p>姐姐，今夜我不关心人类，我只想你</p>
