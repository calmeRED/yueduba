<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机阅读 - 阅读吧</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <button class="hamburger-btn" aria-label="打开菜单">☰</button>
    <a href="index.html" class="logo">阅读吧</a>
    <button class="theme-toggle" aria-label="切换暗黑模式"></button>
  </header>

  <div class="main-layout">
    <nav class="nav-sidebar">
      <a href="random.html" class="nav-item active">
        <span class="icon">🎲</span>
        随机
      </a>
      <a href="index.html" class="nav-item">
        <span class="icon">📚</span>
        书架
      </a>
    </nav>

    <div style="margin-left: calc(var(--sidebar-width) + var(--panel-width)); padding: 40px;">
      <div class="loading">正在随机选取文章...</div>
    </div>
  </div>

  <!-- 抽屉组件（移动端） -->
  <div class="drawer-overlay"></div>
  <div class="drawer">
    <div class="drawer-close">✕</div>
    <div class="drawer-nav">
      <a href="random.html" class="drawer-nav-item">
        <span class="icon">🎲</span> 随机
      </a>
      <a href="index.html" class="drawer-nav-item">
        <span class="icon">📚</span> 书架
      </a>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/drawer.js"></script>
  <script src="js/app.js"></script>
  <script>
    Drawer.init();
    (async function() {
      try {
        const articles = await Utils.loadJSON('data/index.json');
        const randomIndex = Math.floor(Math.random() * articles.length);
        const article = articles[randomIndex];
        window.location.href = `article/${article.id}.html`;
      } catch (error) {
        console.error('Failed to load articles:', error);
        document.querySelector('.loading').textContent = '加载失败，请刷新重试';
      }
    })();
  </script>
</body>
</html>
