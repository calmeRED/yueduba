<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日一文 - 阅读器预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #fafafa;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --accent: #4a90d9;
      --border: #e5e5e5;
      --sidebar-width: 200px;
    }

    body.dark {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2d2d2d;
      --bg-card: #333333;
      --text-primary: #e8e8e8;
      --text-secondary: #a0a0a0;
      --accent: #6ba3e8;
      --border: #404040;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
    }

    .theme-toggle {
      width: 48px;
      height: 28px;
      border-radius: 14px;
      background: var(--border);
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 0.3s;
    }

    .theme-toggle::after {
      content: '☀️';
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      top: 3px;
      left: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: transform 0.3s;
    }

    body.dark .theme-toggle {
      background: var(--accent);
    }

    body.dark .theme-toggle::after {
      content: '🌙';
      transform: translateX(20px);
    }

    /* Main Layout */
    main {
      display: flex;
      padding-top: 56px;
      min-height: 100vh;
    }

    /* Left Navigation Sidebar */
    .nav-sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 56px;
      left: 0;
      bottom: 0;
      padding: 16px 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
      font-size: 14px;
    }

    .nav-item:hover {
      background: var(--border);
      color: var(--text-primary);
    }

    .nav-item.active {
      color: var(--accent);
      background: var(--bg-primary);
      border-left: 3px solid var(--accent);
    }

    .nav-item .icon {
      margin-right: 10px;
      font-size: 16px;
    }

    /* Bookshelf Panel (slides out from left, next to nav) */
    .bookshelf-panel {
      position: fixed;
      top: 56px;
      left: var(--sidebar-width);
      width: 240px;
      bottom: 0;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px 0;
    }

    .bookshelf-title {
      padding: 0 16px 12px;
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .author-item {
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 14px;
    }

    .author-item:hover {
      background: var(--border);
    }

    .author-item.active {
      background: var(--accent);
      color: white;
    }

    .author-count {
      font-size: 12px;
      color: var(--text-secondary);
      margin-left: 8px;
    }

    .author-item.active .author-count {
      color: rgba(255,255,255,0.7);
    }

    /* Article Content */
    .article-container {
      margin-left: calc(var(--sidebar-width) + 240px);
      padding: 40px 60px;
      max-width: 800px;
      width: calc(100% - var(--sidebar-width) - 240px);
    }

    .article-back {
      font-size: 13px;
      color: var(--accent);
      cursor: pointer;
      margin-bottom: 20px;
      display: inline-flex;
      align-items: center;
    }

    .article-back:hover {
      text-decoration: underline;
    }

    .article-header {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .article-title {
      font-size: 28px;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .article-author {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .article-body {
      font-size: 18px;
      line-height: 1.8;
      color: var(--text-primary);
    }

    .article-body p {
      margin-bottom: 1.2em;
      text-align: justify;
    }

    /* Random indicator */
    .random-hint {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    .random-hint .dice {
      font-size: 48px;
      margin-bottom: 16px;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .nav-sidebar {
        width: 100%;
        position: relative;
        top: 0;
        height: auto;
        display: flex;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .bookshelf-panel {
        position: relative;
        top: 0;
        left: 0;
        width: 100%;
        max-height: 200px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .article-container {
        margin-left: 0;
        width: 100%;
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">每日一文</div>
    <button class="theme-toggle" onclick="toggleTheme()"></button>
  </header>

  <main>
    <!-- Left Navigation -->
    <nav class="nav-sidebar">
      <div class="nav-item active" onclick="showRandom()">
        <span class="icon">🎲</span>
        随机
      </div>
      <div class="nav-item" onclick="showBookshelf()">
        <span class="icon">📚</span>
        书架
      </div>
    </nav>

    <!-- Bookshelf Panel (shows when书架 is active) -->
    <aside class="bookshelf-panel" id="bookshelfPanel">
      <div class="bookshelf-title">作者列表</div>
      <div class="author-item" onclick="selectAuthor(this, '汪曾祺')">
        汪曾祺 <span class="author-count">(12)</span>
      </div>
      <div class="author-item" onclick="selectAuthor(this, '朱自清')">
        朱自清 <span class="author-count">(8)</span>
      </div>
      <div class="author-item" onclick="selectAuthor(this, '老舍')">
        老舍 <span class="author-count">(5)</span>
      </div>
      <div class="author-item" onclick="selectAuthor(this, '史铁生')">
        史铁生 <span class="author-count">(6)</span>
      </div>
     <div class="author-item" onclick="selectAuthor(this, '鲁迅')">
        鲁迅 <span class="author-count">(15)</span>
      </div>
    </aside>

    <!-- Article / Random Content -->
    <article class="article-container" id="articleContainer">
      <div class="random-hint">
        <div class="dice">🎲</div>
        <p>点击左侧「随机」开始阅读</p>
      </div>
    </article>
  </main>

  <script>
    const navItems = document.querySelectorAll('.nav-item');
    const authorItems = document.querySelectorAll('.author-item');
    const bookshelfPanel = document.getElementById('bookshelfPanel');
    const articleContainer = document.getElementById('articleContainer');

    let currentView = 'random';

    function toggleTheme() {
      document.body.classList.toggle('dark');
    }

    function showRandom() {
      currentView = 'random';
      navItems.forEach(item => item.classList.remove('active'));
      navItems[0].classList.add('active');
      authorItems.forEach(item => item.classList.remove('active'));
      bookshelfPanel.style.display = 'none';
      articleContainer.innerHTML = `
        <div class="random-hint">
          <div class="dice">🎲</div>
          <p>点击「随机」开始阅读</p>
        </div>
      `;
    }

    function showBookshelf() {
      currentView = 'bookshelf';
      navItems.forEach(item => item.classList.remove('active'));
      navItems[1].classList.add('active');
      bookshelfPanel.style.display = 'block';
      articleContainer.innerHTML = `
        <div class="random-hint">
          <div class="dice">📚</div>
          <p>从左侧选择一个作者</p>
        </div>
      `;
    }

    function selectAuthor(element, authorName) {
      authorItems.forEach(item => item.classList.remove('active'));
      element.classList.add('active');
      articleContainer.innerHTML = `
        <div class="article-header">
          <h1 class="article-title" style="font-size: 20px;">${authorName} 的作品</h1>
          <div class="article-author">共 ${element.querySelector('.author-count').textContent.match(/\d+/)[0]} 篇</div>
        </div>
        <div class="article-body" style="font-size: 16px; color: var(--text-secondary);">
          <p>文章列表将在此显示...</p>
        </div>
      `;
    }

    // Initialize
    showRandom();
  </script>
</body>
</html>
